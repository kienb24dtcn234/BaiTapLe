<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách nhân viên</title>
    <style>
        .avatar-thumb {
            width: 80px;
            height: 80px;
            object-fit: cover;
        }
        .pagination a, .pagination span {
            margin: 0 4px;
            text-decoration: none;
        }
        .pagination .active {
            font-weight: bold;
        }
    </style>
</head>
<body>
<h1>Danh sách nhân viên</h1>

<a th:href="@{/employees/new}">Thêm nhân viên mới</a>

<form th:action="@{/employees}" method="get">
    <input type="text"
           name="keyword"
           placeholder="Tìm theo tên"
           th:value="${keyword}">

    <select name="departmentId">
        <option th:value=""
                th:selected="${departmentId == null}">
            -- Tất cả phòng ban --
        </option>
        <option th:each="dept : ${departments}"
                th:value="${dept.id}"
                th:text="${dept.name}"
                th:selected="${departmentId != null and departmentId == dept.id}">
        </option>
    </select>

    <input type="number"
           name="minAge"
           placeholder="Tuổi từ"
           th:value="${minAge}">
    <input type="number"
           name="maxAge"
           placeholder="Tuổi đến"
           th:value="${maxAge}">

    <input type="hidden" name="sortField" th:value="${sortField}">
    <input type="hidden" name="sortDir" th:value="${sortDir}">
    <button type="submit">Lọc</button>
</form>

<div>
    Sắp xếp theo:
    <a th:href="@{/employees(
                    page=0,
                    sortField='name',
                    sortDir=${sortField == 'name' ? reverseSortDir : 'asc'},
                    keyword=${keyword},
                    departmentId=${departmentId},
                    minAge=${minAge},
                    maxAge=${maxAge}
                )}">
        Tên
    </a> |
    <a th:href="@{/employees(
                    page=0,
                    sortField='age',
                    sortDir=${sortField == 'age' ? reverseSortDir : 'asc'},
                    keyword=${keyword},
                    departmentId=${departmentId},
                    minAge=${minAge},
                    maxAge=${maxAge}
                )}">
        Tuổi
    </a>
</div>

<table border="1" cellpadding="8" cellspacing="0">
    <thead>
    <tr>
        <th>ID</th>
        <th>Tên</th>
        <th>Tuổi</th>
        <th>Avatar</th>
        <th>Status</th>
        <th>Phòng ban</th>
        <th>Địa điểm phòng ban</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(employees)}">
        <td colspan="7">Không tìm thấy nhân viên nào</td>
    </tr>
    <tr th:each="emp : ${employees}">
        <td th:text="${emp.id}"></td>
        <td th:text="${emp.name}"></td>
        <td th:text="${emp.age}"></td>
        <td>
            <img th:if="${emp.avatar != null}"
                 th:src="@{'/uploads/' + ${emp.avatar}}"
                 alt="avatar" class="avatar-thumb">
            <span th:if="${emp.avatar == null}">No avatar</span>
        </td>
        <td th:text="${emp.status}"></td>
        <td th:text="${emp.department.name}"></td>
        <td th:text="${emp.department.location}"></td>
    </tr>
    </tbody>
</table>

<div class="pagination" th:if="${totalPages > 1}">
    <a th:if="${currentPage > 0}"
       th:href="@{/employees(
                    page=${currentPage - 1},
                    sortField=${sortField},
                    sortDir=${sortDir},
                    keyword=${keyword},
                    departmentId=${departmentId},
                    minAge=${minAge},
                    maxAge=${maxAge}
                )}">
        Previous
    </a>

    <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
        <span th:if="${i == currentPage}"
              class="active"
              th:text="${i + 1}"></span>
        <a th:if="${i != currentPage}"
           th:href="@{/employees(
                        page=${i},
                        sortField=${sortField},
                        sortDir=${sortDir},
                        keyword=${keyword},
                        departmentId=${departmentId},
                        minAge=${minAge},
                        maxAge=${maxAge}
                    )}"
           th:text="${i + 1}"></a>
    </span>

    <a th:if="${currentPage + 1 < totalPages}"
       th:href="@{/employees(
                    page=${currentPage + 1},
                    sortField=${sortField},
                    sortDir=${sortDir},
                    keyword=${keyword},
                    departmentId=${departmentId},
                    minAge=${minAge},
                    maxAge=${maxAge}
                )}">
        Next
    </a>
</div>

</body>
</html>
